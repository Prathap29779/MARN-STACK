<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
    <link rel="stylesheet" href="../CSS/Style.css">
    <link rel="stylesheet" href="../CSS/Position.css">
</head>
<body>
    <div class="Data" id="Application">
        <header>
            <h1>Forms</h1>
        </header>
        <main>
            <form>
                <label>Name:</label>
                <input type="text"placeholder="Enter your name" required>
                <br>
                <label>Email:</label>
                <input type="email"placeholder="Enter your email" required>
                <br>
                <label>Password:</label>
                <input type="password"placeholder="Enter your password" required>
                <br>
                <label>Phone Number:</label>
                <input type="mobile number"placeholder="Enter your Phone number" required>
                <br>
                <label>Gender:</label>
                <input type="radio"name="gender"id="1">male 
                <input type="radio"name="gender"id="2">female  
                <br>
                <label>Qualification:</label>
                <input type="checkbox"name="qualification"id="1">10th
                <input type="checkbox"name="qualification"id="2">12th
                <input type="checkbox"name="qualification"id="3">Diploma
                <input type="checkbox"name="qualification"id="4">Graduation
                <input type="checkbox"name="qualification"id="5">Masters
                <br>
                <label>Date Of Birth</label>
                <input type="datetime-local">
                <br>
                <label>Files</label>
                <input type="file">
                <br>
                <button type="submit">Submit</button>
            </form>

        </main>
        <footer>

        </footer>
    </div>
    
</body>
</html>
